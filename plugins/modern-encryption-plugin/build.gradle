/**
 * Modern Encryption plugin - AES-256-GCM via BouncyCastle.
 * Replaces jasypt-encryption-plugin with dual-read support for legacy Jasypt data.
 */

ext.pluginClassNames = 'org.rundeck.plugin.encryption.ModernEncryptionConverterPlugin'
ext.pluginName = 'Modern Encryption Plugin'
ext.pluginDescription = 'Modern encryption using AES-256-GCM with legacy Jasypt read support'

apply from: "../../gradle/java-version.gradle"
apply plugin: 'groovy'

repositories {
    mavenLocal()
    mavenCentral()
}

dependencies {
    implementation project(":core")
    implementation("org.bouncycastle:bcprov-jdk18on:${bouncyCastleVersion}")

    testImplementation "org.spockframework:spock-core:${spockVersion}"
    testImplementation "org.apache.groovy:groovy-all:${groovyVersion}"
    testImplementation "org.jasypt:jasypt:1.9.3"
}

test {
    useJUnitPlatform()
}

jar {
    manifest {
        attributes 'Rundeck-Plugin-Classnames': pluginClassNames
        attributes 'Rundeck-Plugin-Name': pluginName
        attributes 'Rundeck-Plugin-Description': pluginDescription
    }
}
